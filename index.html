<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiket Event Premium</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#efefef;
padding:15px;
}

.container{
max-width:750px;
margin:auto;
padding-bottom:100px;
}

.poster{
width:100%;
border-radius:22px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.12);
margin-bottom:22px;
}

.poster img{
width:100%;
display:block;
}

h1{
text-align:center;
font-size:42px;
margin-bottom:22px;
}

.card{
background:#fff;
border-radius:22px;
overflow:hidden;
margin-bottom:22px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
padding:24px;
gap:10px;
}

.name{
font-size:30px;
color:#888;
}

.price{
font-size:34px;
font-weight:bold;
margin-top:10px;
}

.warn{
margin-top:12px;
display:inline-block;
background:#ffe8e8;
color:#e53935;
padding:8px 14px;
border-radius:50px;
font-size:16px;
font-weight:bold;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:.5;}
}

.qty{
display:flex;
align-items:center;
gap:20px;
border:2px solid #ccc;
padding:10px 16px;
border-radius:16px;
font-size:30px;
font-weight:bold;
}

.qty button{
border:none;
background:none;
font-size:34px;
cursor:pointer;
}

.bottom{
background:#ddd;
padding:20px;
font-size:21px;
line-height:1.5;
}

.bar{
position:fixed;
left:0;
right:0;
bottom:0;
background:#111;
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:99;
}

.total-title{
font-size:13px;
opacity:.8;
}

.total-price{
font-size:28px;
font-weight:bold;
}

.pay{
border:none;
background:#25d366;
color:#fff;
padding:14px 22px;
border-radius:14px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.65);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:999;
}

.box{
background:#fff;
width:100%;
max-width:430px;
border-radius:22px;
padding:20px;
}

.box h2{
text-align:center;
margin-bottom:12px;
}

.timer{
background:#111;
color:#fff;
padding:10px;
border-radius:12px;
text-align:center;
margin-bottom:14px;
font-weight:bold;
}

.qris{
width:100%;
border-radius:14px;
margin-bottom:14px;
}

.input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:12px;
margin-bottom:10px;
font-size:16px;
}

.row{
display:flex;
gap:10px;
margin-top:10px;
}

.row button{
flex:1;
padding:13px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.ok{
background:#25d366;
color:#fff;
}

.close{
background:#111;
color:#fff;
}
</style>
</head>

<body>

<div class="container">

<div class="poster">
<img src="Src.Poster.png">
</div>

<h1>Ticket Category</h1>

<!-- Regular -->
<div class="card">
<div class="top">
<div>
<div class="name">Regular</div>
<div class="price">Rp185,000</div>
<div class="warn">Tambahan Tiket</div>
</div>

<div class="qty">
<button onclick="minusRegular()">-</button>
<span id="regularQty">0</span>
<button onclick="plusRegular()">+</button>
</div>
</div>

<div class="bottom">
Include: 1 tiket Regular Sunset di Kebun Raya Bali
</div>
</div>

<!-- VIP -->
<div class="card">
<div class="top">
<div>
<div class="name">VIP</div>
<div class="price">Rp400,000</div>
<div class="warn">Tambahan Tiket</div>
</div>

<div class="qty">
<button onclick="minusVip()">-</button>
<span id="vipQty">0</span>
<button onclick="plusVip()">+</button>
</div>
</div>

<div class="bottom">
Include: 1 tiket VIP + area khusus VIP + bean bag
</div>
</div>

</div>

<!-- Bottom -->
<div class="bar">
<div>
<div class="total-title">Total</div>
<div class="total-price" id="totalPrice">Rp0</div>
</div>

<button class="pay" onclick="openModal()">Bayar QRIS</button>
</div>

<!-- Modal -->
<div class="modal" id="modal">
<div class="box">

<h2>Form Pembelian</h2>

<div class="timer">
Bayar Dalam <span id="timer">07:00</span>
</div>

<img src="Src.Qris-pembayaran.jpg" class="qris">

<input class="input" placeholder="Nama Lengkap">
<input class="input" placeholder="Nomor WhatsApp">
<input class="input" placeholder="Email">

<div class="row">
<button class="ok">Konfirmasi</button>
<button class="close" onclick="closeModal()">Tutup</button>
</div>

</div>
</div>

<script>
let regular = 0;
let vip = 0;
let timerInterval;

function plusRegular(){
regular++;
update();
}

function minusRegular(){
if(regular > 0){
regular--;
update();
}
}

function plusVip(){
vip++;
update();
}

function minusVip(){
if(vip > 0){
vip--;
update();
}
}

function update(){
document.getElementById("regularQty").innerText = regular;
document.getElementById("vipQty").innerText = vip;

let total = (regular * 185000) + (vip * 400000);

document.getElementById("totalPrice").innerText =
"Rp" + total.toLocaleString("id-ID");
}

function openModal(){
document.getElementById("modal").style.display = "flex";
startTimer();
}

function closeModal(){
document.getElementById("modal").style.display = "none";
clearInterval(timerInterval);
}

function startTimer(){
clearInterval(timerInterval);

let seconds = 420;

timerInterval = setInterval(function(){

let minutes = Math.floor(seconds / 60);
let remain = seconds % 60;

document.getElementById("timer").innerText =
String(minutes).padStart(2,"0") + ":" +
String(remain).padStart(2,"0");

seconds--;

if(seconds < 0){
clearInterval(timerInterval);
document.getElementById("timer").innerText = "WAKTU HABIS";
}

},1000);
}
</script>

</body>
</html>
